<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imperial Gazette – Newsletter Editor</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
    rel="stylesheet">
  <style>
    @media print {

      .topbar,
      .sidebar {
        display: none !important;
      }

      .app {
        display: block !important;
        height: auto !important;
      }

      .preview-panel {
        overflow: visible !important;
        background: white !important;
        padding: 0 !important;
      }

      .gazette {
        max-width: 100% !important;
        box-shadow: none !important;
      }
    }

    :root {
      --parchment: #f5f0e8;
      --parchment-dark: #ede5d5;
      --ink: #1a1208;
      --ink-light: #2a1e0a;
      --gold: #b8973a;
      --gold-light: #d4af5a;
      --gold-pale: #f0e5c0;
      --sage: #3d5a3e;
      --border: #c8b882;
      --muted: #7a6a4a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #2a2010;
      font-family: 'EB Garamond', serif;
      color: var(--ink);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: 52px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* TOP BAR */
    .topbar {
      grid-column: 1/-1;
      background: var(--ink);
      border-bottom: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      gap: 14px;
    }

    .topbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 5px 16px;
      border: 1px solid var(--gold);
      cursor: pointer;
      transition: all .2s;
    }

    .btn-ghost {
      background: transparent;
      color: var(--gold-light);
    }

    .btn-ghost:hover {
      background: rgba(184, 151, 58, .15);
    }

    .btn-primary {
      background: var(--gold);
      color: var(--ink);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--gold-light);
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--parchment-dark);
      border-right: 2px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--parchment);
    }

    .sidebar-title {
      font-family: 'Playfair Display', serif;
      font-size: 10px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .sidebar-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
    }

    .section-group {
      border-bottom: 1px solid var(--border);
    }

    .section-group-header {
      padding: 9px 18px;
      font-family: 'Playfair Display', serif;
      font-size: 9px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      background: var(--ink);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .section-group-header .chevron {
      transition: transform .2s;
    }

    .section-group-header.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .section-group-body {
      padding: 11px 15px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .section-group-body.hidden {
      display: none;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .field input,
    .field textarea {
      background: var(--parchment);
      border: 1px solid var(--border);
      font-family: 'EB Garamond', serif;
      font-size: 13px;
      color: var(--ink);
      padding: 6px 8px;
      outline: none;
      resize: vertical;
      transition: border-color .2s;
      width: 100%;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--gold);
    }

    .field textarea {
      min-height: 58px;
      line-height: 1.5;
    }

    .news-item,
    .highlight-item {
      border: 1px solid var(--border);
      background: var(--parchment);
      padding: 9px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      margin-bottom: 7px;
    }

    .item-num {
      font-family: 'Playfair Display', serif;
      font-size: 10px;
      color: var(--gold);
      letter-spacing: .1em;
    }

    .news-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
    }

    .news-remove:hover {
      color: #8b3a1a;
    }

    .btn-add {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 6px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all .2s;
    }

    .btn-add:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* PREVIEW PANEL */
    .preview-panel {
      overflow-y: auto;
      background: #3a2e18;
      padding: 16px 6px;
    }

    /* ════════════════════════════════════
     GAZETTE STYLES
  ════════════════════════════════════ */
    .gazette {
      max-width: 740px;
      margin: 0 auto;
      background: var(--parchment);
      font-family: 'EB Garamond', serif;
      position: relative;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .5);
    }

    /* MASTHEAD */
    .masthead {
      padding: 20px 38px 0;
      text-align: center;
      border-bottom: 3px double var(--border);
    }

    .masthead-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 46px;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -.01em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .masthead-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 9px;
    }

    .masthead-meta {
      display: flex;
      justify-content: space-between;
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 5px 0;
      border-top: 1px solid var(--border);
    }

    /* HERO */
    .hero {
      padding: 22px 38px;
      text-align: center;
      border-bottom: 2px solid var(--border);
    }

    .hero-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 9px;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 900;
      line-height: 1.08;
      color: var(--ink);
      text-transform: uppercase;
      margin-bottom: 11px;
    }

    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      color: var(--muted);
      max-width: 450px;
      margin: 0 auto;
      line-height: 1.55;
    }

    /* ORNAMENT */
    .ornament {
      text-align: center;
      color: var(--gold);
      font-size: 15px;
      padding: 7px 0;
      letter-spacing: .3em;
      background: var(--parchment);
    }

    /* PROCLAMATION */
    .proclamation {
      margin: 0 38px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      background: var(--gold-pale);
      padding: 16px 20px;
    }

    .proclamation-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 7px;
      text-align: center;
    }

    .proclamation-greeting {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-style: italic;
      color: var(--ink-light);
      margin-bottom: 9px;
    }

    .proclamation-body {
      font-family: 'EB Garamond', serif;
      font-size: 13px;
      line-height: 1.72;
      color: var(--ink);
      columns: 2;
      column-gap: 18px;
      margin-bottom: 9px;
      text-align: justify;
    }

    .proclamation-sig {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      font-style: italic;
      color: var(--muted);
      text-align: right;
    }

    /* SECTION COMMON */
    .section-spacer {
      height: 0;
      background: var(--parchment);
    }

    .section-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .section-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--ink);
      letter-spacing: .08em;
    }

    .section-rule {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 5px auto 0;
    }

    /* CROWN NEWS */
    .crown-news {
      padding: 22px 38px;
      border-bottom: 2px solid var(--border);
    }

    .news-articles {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .news-article {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 9px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .news-article:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .article-num {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      padding-top: 2px;
    }

    .article-headline {
      font-family: 'Playfair Display', serif;
      font-size: 13.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--ink);
      margin-bottom: 5px;
      text-align: left;
    }

    .article-body {
      font-size: 12.5px;
      line-height: 1.68;
      color: var(--ink-light);
      text-align: justify;
    }

    .article-read-more {
      display: inline-block;
      margin-top: 7px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
      padding-bottom: 1px;
    }

    .article-read-more:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    /* EDICTS */
    .edicts {
      padding: 22px 38px;
      border-bottom: 2px solid var(--border);
      background: var(--parchment-dark);
    }

    .edict-quote {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-style: italic;
      line-height: 1.5;
      color: var(--ink);
      text-align: center;
      padding: 0 10px;
      margin-bottom: 14px;
    }

    .edict-quote::before {
      content: '\u201C';
      color: var(--gold);
      font-size: 34px;
      vertical-align: -10px;
      margin-right: 3px;
    }

    .edict-quote::after {
      content: '\u201D';
      color: var(--gold);
      font-size: 34px;
      vertical-align: -10px;
      margin-left: 3px;
    }

    .edict-body {
      columns: 2;
      column-gap: 20px;
      font-size: 12.5px;
      line-height: 1.72;
      color: var(--ink-light);
      text-align: justify;
    }

    .edict-office {
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
    }

    /* HIGHLIGHTS */
    .highlights {
      padding: 22px 38px;
      border-bottom: 2px solid var(--border);
    }

    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 11px;
    }

    .highlight-card {
      border: 1px solid var(--border);
      padding: 13px;
      background: var(--parchment-dark);
    }

    .highlight-card-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 5px;
      font-weight: 200;
    }

    .highlight-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .highlight-card-body {
      font-size: 11.5px;
      line-height: 1.6;
      color: var(--ink-light);
      text-align: justify;
    }

    /* CTA */
    .cta {
      padding: 22px 38px;
      text-align: center;
      border-bottom: 2px solid var(--border);
    }

    .cta-inner {
      border: 2px solid var(--border);
      padding: 20px 26px;
      background: var(--parchment-dark);
    }

    .cta-text {
      font-family: 'EB Garamond', serif;
      font-size: 13.5px;
      color: var(--ink-light);
      margin-bottom: 14px;
      line-height: 1.65;
    }

    .cta-btn-render {
      display: inline-block;
      background: var(--sage);
      color: var(--parchment);
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 11px 28px;
      text-decoration: none;
    }

    /* FOOTER DIVIDER */
    .footer-divider {
      display: flex;
      align-items: center;
      padding: 14px 38px 0;
    }

    .footer-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer-divider-diamond {
      font-size: 12px;
      color: var(--gold);
      margin: 0 11px;
      line-height: 1;
    }

    /* FOOTER */
    .gazette-footer {
      background: var(--parchment);
    }

    .footer-closing-quote {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      text-align: center;
      padding: 18px 48px 4px;
    }

    .footer-decree {
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 14px;
    }

    .footer-rule {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .footer-brand-block {
      text-align: center;
      padding: 14px 38px 5px;
    }

    .footer-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .footer-brand-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--ink-light);
    }

    .footer-links-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 9px 38px 4px;
    }

    .footer-link-item {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: .08em;
      color: var(--ink-light);
      text-decoration: none;
    }

    .footer-link-item:hover {
      color: var(--gold);
    }

    .footer-short-rule {
      width: 130px;
      height: 1px;
      background: var(--border);
      margin: 7px auto 9px;
    }

    .footer-unsub-note {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      padding: 0 48px 5px;
    }

    .footer-unsub-link {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .1em;
      text-align: center;
      padding-bottom: 18px;
      text-decoration: underline;
      cursor: pointer;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--parchment-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
    }
  </style>
</head>

<body>
  <div class="app">

    <header class="topbar">
      <span class="topbar-brand">⸻ Imperial Gazette · Newsletter Editor</span>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="resetForm()">Reset</button>
        <button class="btn btn-ghost" onclick="exportHTML()">Export HTML</button>
        <button class="btn btn-primary" onclick="window.print()">Save as PDF</button>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Imperial Court of Vovance</div>
        <div class="sidebar-subtitle">Edit Your Dispatch</div>
      </div>

      <!-- 1. MASTHEAD -->
      <div class="section-group">
        <div class="section-group-header" onclick="toggleGroup(this)">Masthead &amp; Identity <span
            class="chevron">▾</span></div>
        <div class="section-group-body">
          <div class="field"><label>Publication Name</label><input id="pub-name" value="The Vovance Imperial Gazette"
              oninput="update()"></div>
          <div class="field"><label>Tagline</label><input id="pub-tagline"
              value="Curated by the Royal Intelligence Engine" oninput="update()"></div>
          <div class="field"><label>Edition / Date</label><input id="pub-edition" value="Edition No. 111"
              oninput="update()"></div>
          <div class="field"><label>Volume / Issue</label><input id="pub-volume" value="Vol. 4 · Issue 33"
              oninput="update()"></div>
          <div class="field"><label>Subscriber Count</label><input id="pub-subs" value="Members: 23,472"
              oninput="update()"></div>
        </div>
      </div>

      <!-- 2. HERO -->
      <div class="section-group">
        <div class="section-group-header" onclick="toggleGroup(this)">Hero Section <span class="chevron">▾</span></div>
        <div class="section-group-body">
          <div class="field"><label>Eyebrow Label</label><input id="hero-eyebrow" value="From a Special Dispatch"
              oninput="update()"></div>
          <div class="field"><label>Main Headline</label><textarea id="hero-title"
              oninput="update()">The Reign of Intelligence Has Begun</textarea></div>
          <div class="field"><label>Subtitle</label><textarea id="hero-subtitle"
              oninput="update()">A sovereign decree from the Imperial Court of Vovance. The future does not wait. Neither shall we.</textarea>
          </div>
        </div>
      </div>


      <!-- 4. PROCLAMATION -->
      <div class="section-group">
        <div class="section-group-header" onclick="toggleGroup(this)">Royal Proclamation <span class="chevron">▾</span>
        </div>
        <div class="section-group-body">
          <div class="field"><label>Greeting</label><input id="proc-greeting" value="To the Architects of Tomorrow,"
              oninput="update()"></div>
          <div class="field"><label>Body (Enter = new paragraph)</label><textarea id="proc-body"
              style="min-height:105px"
              oninput="update()">The landscape of commerce has shifted beneath the feet of the unprepared. Those who hesitated have been left behind. Those who moved with conviction are positioned for the future. The age of passive adoption is over. What remains is the age of sovereign intelligence.

At Vovance, we do not merely observe transformation. We orchestrate it. The Imperial autonomous intelligence has assumed the throne. Every royal barrier has been removed for strategic weight. Read carefully. Act decisively. The throne favors those that bold.</textarea>
          </div>
          <div class="field"><label>Signature</label><input id="proc-sig" value="— The Imperial Court of Vovance"
              oninput="update()"></div>
        </div>
      </div>

      <!-- 5. CROWN NEWS -->
      <div class="section-group">
        <div class="section-group-header" onclick="toggleGroup(this)">Crown News Articles <span class="chevron">▾</span>
        </div>
        <div class="section-group-body">
          <div id="news-items"></div>
          <button class="btn-add" onclick="addNews()">+ Add Article</button>
        </div>
      </div>

      <!-- 6. EDICTS -->
      <div class="section-group">
        <div class="section-group-header" onclick="toggleGroup(this)">Edicts from the Court <span
            class="chevron">▾</span></div>
        <div class="section-group-body">
          <div class="field"><label>Featured Quote</label><textarea id="edict-quote"
              oninput="update()">The enterprise that treats AI as a tool will be consumed by the enterprise that treats AI as its foundation.</textarea>
          </div>

    window.addEventListener('message', function(event) {
      if (!event.data || event.data.type !== 'GET_EXPORT_HTML') return;
      try {
        var html = buildEmailSafeHTML();
        var subject = e('pub-name') || 'The Vovance Imperial Gazette';
        event.source.postMessage(
          { type: 'EXPORT_HTML', html: html, subject: subject },
          event.origin || '*'
        );
      } catch(err) {
        event.source.postMessage(
          { type: 'EXPORT_HTML_ERROR', error: err.message },
          event.origin || '*'
        );
